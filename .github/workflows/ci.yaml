on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '23 14 * * 2'
name: build
jobs:
  lint:
    name: "Run hlint"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up HLint
      uses: haskell-actions/hlint-setup@v2
      with:
        version: "3.6.1"
    - name: Run HLint
      uses: haskell-actions/hlint-run@v2
      with:
        fail-on: warning

  fourmolu:
    name: "Run fourmolu"
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: haskell-actions/run-fourmolu@v12
      with:
        version: "0.19.0.0"

  generateMatrix:
    name: "Generate matrix from cabal"
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    runs-on: ubuntu-latest
    steps:
      - uses: kleidukos/get-tested@v0.1.9.1
        id: set-matrix
        with:
          cabal-file: "tinycheck.cabal"
          ubuntu: true
          version: 0.1.6.0

  build-cabal:
    runs-on: ubuntu-latest
    needs: generateMatrix
    strategy:
      matrix: ${{ fromJSON(needs.generateMatrix.outputs.matrix) }}
    name: Haskell GHC ${{ matrix.ghc }} cabal
    steps:
      - uses: actions/checkout@v6
      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ matrix.ghc }}
      - name: Configure the build
        run: |
          cabal configure --enable-tests --enable-benchmarks --disable-documentation
          cabal build all --dry-run
      - name: Restore cached dependencies
        uses: actions/cache/restore@v5
        id: cache
        env:
          key: ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-cabal-${{ steps.setup.outputs.cabal-version }}
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ env.key }}-plan-${{ hashFiles('**/plan.json') }}
          restore-keys: ${{ env.key }}-
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: cabal build all --enable-tests --enable-benchmarks --only-dependencies
      - name: Save cached dependencies
        uses: actions/cache/save@v5
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ steps.cache.outputs.cache-primary-key }}
      - name: Cabal build packages
        run: cabal build all --enable-tests --enable-benchmarks -fdev
      - name: Cabal test
        run: cabal test all --enable-tests --test-show-details=Always

  generate-flake-ghc-matrix:
    name: Generate GHC versions for nix flake build matrix
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.generate-versions.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: tinycheck
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Generate versions
        id: generate-versions
        run: |
          echo -n "versions=" >> "$GITHUB_OUTPUT"
          nix eval .#supportedGhcs --json >> "$GITHUB_OUTPUT"

  check-flake:
    name: Check Flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: tinycheck
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix flake check
      - name: Check whether .nix files are formatted
        run: |
          nix fmt
          git diff --exit-code

  check-cabal-file:
    name: Check cabal file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: haskell-actions/setup@v2
      - uses: tfausak/cabal-gild-setup-action@v2
        with:
          version: 1.5.0.3
      - run: ./cabal_check.sh

  build-flake:
    name: Nix Flake
    needs:
      - generate-flake-ghc-matrix
    strategy:
      matrix:
        version: ${{ fromJSON(needs.generate-flake-ghc-matrix.outputs.versions) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: tinycheck
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix build .#legacyPackages.x86_64-linux.${{ matrix.version }}.tinycheck-all --accept-flake-config
      - run: nix develop .#${{ matrix.version }} --accept-flake-config -c cabal update -fdev
      - run: nix develop .#${{ matrix.version }} --accept-flake-config -c cabal test all -fdev

  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: tinycheck
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - run: nix develop . --accept-flake-config -c cabal update -fdev
      - run: nix develop . --accept-flake-config -c cabal bench --enable-benchmarks

  success:
    name: Successfully build and test on all systems
    needs:
      - benchmark
      - build-cabal
      - build-flake
      - lint
      - fourmolu
      - check-flake
      - check-cabal-file
    runs-on: ubuntu-latest
    if: always()
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: exit 1
